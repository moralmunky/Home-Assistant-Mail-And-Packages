name: Pytest

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev

jobs:
  tests:
    runs-on: "ubuntu-latest"
    name: Run tests
    strategy:
      matrix:
        python-version:
          # - "3.10"
          # - "3.11"
          # - "3.12"
          - "3.13"

    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: 🛠️ Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v5
      - name: 📦 Install requirements
        run: uv pip install --system -r requirements_test.txt
      - name: 🏃 Run pytest
        run: pytest tests --cov=custom_components/mail_and_packages --cov-report=xml
      - name: 📤 Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    name: Lint (ruff)
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
      - name: 🛠️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v5
      - name: 📦 Install requirements
        run: uv pip install --system -r requirements_test.txt
      - name: 🧹 Run ruff format check
        run: ruff format --check custom_components/ tests/
      - name: 🔍 Run ruff check
        run: ruff check custom_components/ tests/

  mypy:
    runs-on: ubuntu-latest
    name: Type check (mypy)
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
      - name: 🛠️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v5
      - name: 📦 Install requirements
        run: uv pip install --system -r requirements_test.txt
      - name: 🔎 Run mypy
        run: mypy custom_components/mail_and_packages

  coverage:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: 📥 Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
      - name: 📤 Upload coverage report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          files: ./coverage.xml
