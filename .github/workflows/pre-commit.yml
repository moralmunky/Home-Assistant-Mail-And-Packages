name: Pre-commit

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - dev

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    name: Pre-commit checks
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 🔍 Run pre-commit
        uses: pre-commit/action@v3.0.1
